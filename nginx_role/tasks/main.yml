- name: update
  apt:
    update_cache: yes
  tags: 
    - update-apt  

- name: Install NGINX (Debian/Ubuntu)
  apt:
    name: nginx
    state: latest
  notify: start nginx
  tags: 
    - nginx-package

- name: Create NGINX config file from template
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: restart nginx
  tags: 
    - nginx-config
